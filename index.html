<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Proof of Activity Shop</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#141e30,#243b55);
color:white;
text-align:center;
padding:40px;
}

.card{
background:white;
color:black;
padding:25px;
border-radius:15px;
max-width:500px;
margin:auto;
margin-top:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

button{
padding:12px;
width:100%;
border:none;
border-radius:10px;
margin-top:10px;
font-weight:bold;
cursor:pointer;
}

.connect{background:#3498db;color:white;}
.buy{background:#3498db;color:white;}
.burn{background:#3498db;color:white;}

.status{
margin-top:10px;
background:#eee;
padding:10px;
border-radius:8px;
word-break:break-all;
}

</style>
</head>

<body>

<h1>🛒 Proof of Activity Shop</h1>
<p>Sistem Jual Beli Barang berbasis Blockchain</p>

<div class="card">

<button class="connect" id="connectBtn">
Hubungkan MetaMask
</button>

<div id="wallet" class="status">
Wallet belum terhubung
</div>

</div>


<div class="card">

<h3>Beli Ticket Aktivitas</h3>
<p>Harga: 0.0001 ETH</p>

<button class="buy" id="buyBtn" disabled>
Beli Ticket
</button>

</div>


<div class="card">

<h3>Gunakan Ticket</h3>

<button class="burn" id="burnBtn" disabled>
Bayar & Ambil Barang
</button>

<div id="status" class="status">
Hubungkan wallet dulu
</div>

</div>


<script>

// CONTRACT ADDRESS
const contractAddress = "0x49006b682542fCa6178be537E1859053b42f5808";

// ABI
const abi = [

{
"inputs":[],
"name":"buyTicketKoin",
"outputs":[],
"stateMutability":"payable",
"type":"function"
},

{
"inputs":[],
"name":"burnTicketToEnter",
"outputs":[],
"stateMutability":"nonpayable",
"type":"function"
},

{
"inputs":[
{"internalType":"address","name":"","type":"address"}
],
"name":"ticketBalance",
"outputs":[
{"internalType":"uint256","name":"","type":"uint256"}
],
"stateMutability":"view",
"type":"function"
}

];

let provider;
let signer;
let contract;

const connectBtn = document.getElementById("connectBtn");
const buyBtn = document.getElementById("buyBtn");
const burnBtn = document.getElementById("burnBtn");

const wallet = document.getElementById("wallet");
const status = document.getElementById("status");

async function connectWallet(){

if(window.ethereum){

provider = new ethers.providers.Web3Provider(window.ethereum);

await provider.send("eth_requestAccounts",[]);

signer = provider.getSigner();

const address = await signer.getAddress();

contract = new ethers.Contract(contractAddress,abi,signer);

wallet.innerText = "Terhubung: " + address;

buyBtn.disabled = false;
burnBtn.disabled = false;

status.innerText = "Wallet berhasil terhubung";

}else{

alert("Install MetaMask dulu!");

}

}


async function buyTicket(){

try{

status.innerText = "Transaksi sedang diproses...";

const tx = await contract.buyTicketKoin({

value: ethers.utils.parseEther("0.0001")

});

await tx.wait();

status.innerText = "Ticket berhasil dibeli!";

}catch(err){

console.log(err);

status.innerText = "Transaksi gagal";

}

}



async function burnTicket(){

try{

status.innerText = "Memproses aktivitas...";

const tx = await contract.burnTicketToEnter();

await tx.wait();

status.innerText = "Barang berhasil dibeli";

}catch(err){

console.log(err);

status.innerText = "Kamu tidak punya ticket";

}

}


connectBtn.onclick = connectWallet;
buyBtn.onclick = buyTicket;
burnBtn.onclick = burnTicket;

</script>

</body>
</html>
